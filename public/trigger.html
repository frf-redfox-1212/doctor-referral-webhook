<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLAB Referral Admin</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #1a1a1a; font-size: 22px; }
    .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 16px; }
    button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 15px; cursor: pointer; width: 100%; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 13px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    .info { background: #dbeafe; color: #1e40af; }
    .progress { background: #f3f4f6; border-radius: 6px; height: 12px; margin: 12px 0; overflow: hidden; }
    .progress-bar { background: #2563eb; height: 100%; transition: width 0.3s; }
  </style>
</head>
<body>
  <h1>KLAB Nutra — Referral Admin</h1>
  <div class="card">
    <label>Admin Secret</label>
    <input id="secret" type="password" placeholder="Your ADMIN_SECRET" />
    <label>Batch Size (codes per request)</label>
    <input id="batchSize" type="number" value="200" />
    <button onclick="startSync()" id="syncBtn">🔄 Sync All Discount Codes to Shopify</button>
    <div class="progress" id="progressBar" style="display:none">
      <div class="progress-bar" id="progressFill" style="width:0%"></div>
    </div>
    <div id="syncResult"></div>
  </div>
  <script>
    let running = false;
    async function startSync() {
      if (running) return;
      const secret = document.getElementById('secret').value.trim();
      const batchSize = parseInt(document.getElementById('batchSize').value) || 200;
      const btn = document.getElementById('syncBtn');
      const result = document.getElementById('syncResult');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      if (!secret) { result.className = 'result error'; result.textContent = 'Please enter your Admin Secret'; return; }
      running = true;
      btn.disabled = true;
      progressBar.style.display = 'block';
      let offset = 0, totalCreated = 0, totalSkipped = 0, totalFailed = 0, totalCodes = null, log = '';
      while (true) {
        result.className = 'result info';
        result.textContent = `⏳ Processing batch at offset ${offset}...\n\n${log}`;
        try {
          const response = await fetch('/api/sync-discount-codes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
            body: JSON.stringify({ offset, limit: batchSize })
          });
          const data = await response.json();
          if (!response.ok) { result.className = 'result error'; result.textContent = `✗ Error at offset ${offset}:\n${JSON.stringify(data, null, 2)}`; break; }
          totalCreated += data.created;
          totalSkipped += data.skipped;
          totalFailed += data.failed;
          totalCodes = data.total_codes;
          offset = data.next_offset;
          const pct = Math.round((offset / totalCodes) * 100);
          progressFill.style.width = `${pct}%`;
          log = `✓ Progress: ${offset}/${totalCodes} (${pct}%)\nCreated: ${totalCreated} | Skipped: ${totalSkipped} | Failed: ${totalFailed}`;
          if (data.done) {
            result.className = 'result success';
            result.textContent = `✅ Sync complete!\n\nTotal: ${totalCodes}\nCreated: ${totalCreated}\nSkipped: ${totalSkipped}\nFailed: ${totalFailed}`;
            progressFill.style.width = '100%';
            break;
          }
          await new Promise(r => setTimeout(r, 500));
        } catch (err) {
          result.className = 'result error';
          result.textContent = `✗ Network error at offset ${offset}: ${err.message}\n\n${log}`;
          break;
        }
      }
      running = false;
      btn.disabled = false;
    }
  </script>
</body>
</html>
