<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLAB Referral Admin</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #1a1a1a; font-size: 22px; }
    .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    h2 { font-size: 16px; margin: 0 0 16px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 16px; }
    button { color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 15px; cursor: pointer; width: 100%; margin-bottom: 8px; }
    .btn-blue { background: #2563eb; }
    .btn-blue:hover { background: #1d4ed8; }
    .btn-green { background: #16a34a; }
    .btn-green:hover { background: #15803d; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 13px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    .info { background: #dbeafe; color: #1e40af; }
    .progress { background: #f3f4f6; border-radius: 6px; height: 12px; margin: 12px 0; overflow: hidden; }
    .progress-bar { height: 100%; transition: width 0.3s; }
    .blue { background: #2563eb; }
    .green { background: #16a34a; }
  </style>
</head>
<body>
  <h1>KLAB Nutra — Referral Admin</h1>

  <div class="card">
    <label>Admin Secret</label>
    <input id="secret" type="password" placeholder="Your ADMIN_SECRET" />
  </div>

  <!-- Sync new codes -->
  <div class="card">
    <h2>🔄 Sync New Codes to Shopify</h2>
    <label>Codes per batch</label>
    <input id="batchSize" type="number" value="500" />
    <button class="btn-blue" onclick="startSync()" id="syncBtn">Start Sync</button>
    <div class="progress" id="syncProgress" style="display:none">
      <div class="progress-bar blue" id="syncFill" style="width:0%"></div>
    </div>
    <div id="syncResult"></div>
  </div>

  <!-- Verify synced codes -->
  <div class="card">
    <h2>✅ Verify & Update Sync Status</h2>
    <p style="font-size:13px;color:#666;margin:0 0 16px">Checks Shopify for all existing codes and updates shopify_synced in Supabase. Run this after overnight sync.</p>
    <button class="btn-green" onclick="verifySync()" id="verifyBtn">Verify Sync Status</button>
    <div id="verifyResult"></div>
  </div>

  <script>
    let running = false;

    async function startSync() {
      if (running) return;
      const secret = document.getElementById('secret').value.trim();
      const batchSize = parseInt(document.getElementById('batchSize').value) || 500;
      const btn = document.getElementById('syncBtn');
      const result = document.getElementById('syncResult');
      const progress = document.getElementById('syncProgress');
      const fill = document.getElementById('syncFill');
      if (!secret) { result.className = 'result error'; result.textContent = 'Enter Admin Secret'; return; }

      running = true; btn.disabled = true; progress.style.display = 'block';
      let totalSynced = 0, totalFailed = 0, initialRemaining = null;

      while (true) {
        result.className = 'result info';
        result.textContent = `⏳ Syncing...\nSynced: ${totalSynced} | Failed: ${totalFailed}`;
        try {
          const res = await fetch('/api/sync-discount-codes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
            body: JSON.stringify({ limit: batchSize })
          });
          const data = await res.json();
          if (!res.ok) { result.className = 'result error'; result.textContent = `✗ Error:\n${JSON.stringify(data, null, 2)}`; break; }
          totalSynced += data.synced;
          totalFailed += data.failed;
          if (initialRemaining === null) initialRemaining = data.remaining + data.synced;
          const pct = initialRemaining > 0 ? Math.min(Math.round((totalSynced / initialRemaining) * 100), 100) : 100;
          fill.style.width = `${pct}%`;
          if (data.done) {
            result.className = 'result success';
            result.textContent = `✅ All codes synced!\nSynced: ${totalSynced} | Failed: ${totalFailed}`;
            fill.style.width = '100%';
            break;
          }
          await new Promise(r => setTimeout(r, 500));
        } catch (err) {
          result.className = 'result error';
          result.textContent = `✗ Error: ${err.message}\nSynced so far: ${totalSynced}`;
          break;
        }
      }
      running = false; btn.disabled = false;
    }

    async function verifySync() {
      if (running) return;
      const secret = document.getElementById('secret').value.trim();
      const btn = document.getElementById('verifyBtn');
      const result = document.getElementById('verifyResult');
      if (!secret) { result.className = 'result error'; result.textContent = 'Enter Admin Secret'; return; }

      running = true; btn.disabled = true;
      result.className = 'result info';
      result.textContent = '⏳ Fetching all codes from Shopify and verifying...\nThis may take a few minutes.';

      try {
        const res = await fetch('/api/verify-shopify-sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
        });
        const data = await res.json();
        if (!res.ok) { result.className = 'result error'; result.textContent = `✗ Error:\n${JSON.stringify(data, null, 2)}`; }
        else {
          result.className = 'result success';
          result.textContent = `✅ Verification complete!\n\nCodes in Shopify: ${data.shopify_total}\nMarked synced in Supabase: ${data.marked_synced}\nNot in Shopify (will sync next run): ${data.not_in_shopify}`;
        }
      } catch (err) {
        result.className = 'result error';
        result.textContent = `✗ Error: ${err.message}`;
      }
      running = false; btn.disabled = false;
    }
  </script>
</body>
</html>
